name: Deploy site with refactor preview

on:
  push:
    branches: [main, refactor]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout refactor
        uses: actions/checkout@v4
        with:
          ref: refactor
          path: refactor

      - name: Build combined site
        run: |
          mkdir -p _site
          # Main branch as root site
          cp -r main/* _site/ 2>/dev/null || true
          # Refactor branch into /preview/
          mkdir -p _site/preview
          cp -r refactor/* _site/preview/ 2>/dev/null || true
          # Cleanup
          rm -rf _site/.git _site/preview/.git
          rm -rf _site/.github _site/preview/.github
          rm -rf _site/.claude _site/preview/.claude

      - name: Deploy to gh-pages branch
        run: |
          cd _site
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy main + refactor preview"
          git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:gh-pages
