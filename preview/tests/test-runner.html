<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>myApps — Test Runner</title>
<style>
:root{--bg:#f8fafc;--surface:#fff;--border:#e2e8f0;--text:#1e293b;--green:#16a34a;--red:#dc2626;--accent:#2a9aa0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);padding:24px;max-width:900px;margin:0 auto}
h1{font-size:24px;font-weight:900;margin-bottom:4px}
.sub{font-size:13px;color:#64748b;margin-bottom:24px}
.suite{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.suite h3{font-size:16px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.suite-results{min-height:40px}
.summary{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;font-size:18px;font-weight:800}
.summary.pass{border-color:var(--green);color:var(--green)}
.summary.fail{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<h1>myApps Test Runner</h1>
<div class="sub">Open this page in a browser to run all logic tests. No server required.</div>

<div id="overallSummary" class="summary" style="display:none"></div>

<div class="suite">
  <h3>HRMS Logic Tests</h3>
  <div class="suite-results" id="hrmsResults">Loading...</div>
</div>

<div class="suite">
  <h3>VMS Logic Tests</h3>
  <div class="suite-results" id="vmsResults">Loading...</div>
</div>

<div class="suite">
  <h3>HWMS Logic Tests</h3>
  <div class="suite-results" id="hwmsResults">Loading...</div>
</div>

<!-- Test framework + mocks -->
<script src="test-helpers.js"></script>

<!-- Logic files under test -->
<script src="../js/hrms-logic.js"></script>
<script src="../js/vms-logic.js"></script>
<script src="../js/hwms-logic.js"></script>

<!-- Test suites -->
<script src="test-hrms-logic.js"></script>
<script src="test-vms-logic.js"></script>
<script src="test-hwms-logic.js"></script>

<!-- Run all tests -->
<script>
(function(){
  var r = runTests();
  // Render per-suite results
  var suites = {hrms:[], vms:[], hwms:[]};
  // The renderResults function renders all at once; let's just use it
  renderResults('hrmsResults');
  // For now, show combined results in each panel
  // We'll split by suite name prefix
  var el = document.getElementById('overallSummary');
  el.style.display = 'block';
  el.className = 'summary ' + (r.failed === 0 ? 'pass' : 'fail');
  el.innerHTML = (r.failed === 0 ? '&#10003; ALL TESTS PASSED' : '&#10007; ' + r.failed + ' TESTS FAILED') +
    ' &mdash; ' + r.passed + '/' + r.total + ' passed';
  // Show errors in hrmsResults (combined for now)
  document.getElementById('vmsResults').innerHTML = '<div style="color:#64748b;font-size:13px">Results shown above (combined)</div>';
  document.getElementById('hwmsResults').innerHTML = '<div style="color:#64748b;font-size:13px">Results shown above (combined)</div>';
})();
</script>
</body>
</html>
